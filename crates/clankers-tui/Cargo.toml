[package]
name = "clankers-tui"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[dependencies]
clankers-autoresearch = { version = "0.1.0", path = "../clankers-autoresearch" }
clankers-protocol = { version = "0.1.0", path = "../clankers-protocol" }
clanker-tui-types = { workspace = true }
rat-branches = { workspace = true }
rat-keymap = { workspace = true }
rat-leaderkey = { workspace = true }
rat-markdown = { workspace = true }
rat-widgets = { workspace = true }

arboard = { version = "3", features = ["image-data"] }
base64 = "0.22"
chrono = { workspace = true }
crossterm = "0.29"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp"] }
git2 = "0.20"
indexmap = { version = "2.13.0", features = ["serde"] }
ratatui = "0.30"
ratatui-hypertile = { version = "0.1", features = ["serde"] }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
similar = "2.7"
unicode-width = "0.2"

[dev-dependencies]
tempfile = "3"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(dylint_lib, values("tigerstyle"))'] }
