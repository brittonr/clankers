[package]
name = "clankers-zellij"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "P2P terminal sharing via Zellij and iroh QUIC"

[dependencies]
dirs = "6"
hex = "0.4"
iroh = { version = "0.96", features = ["address-lookup-mdns"] }
rand = "0.9"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
