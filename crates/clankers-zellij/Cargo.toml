[package]
name = "clankers-zellij"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "P2P terminal sharing via Zellij and iroh QUIC"

[dependencies]
dirs = "6"
hex = "0.4"
iroh = { version = "0.96", features = ["address-lookup-mdns"] }
rand = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(dylint_lib, values("tigerstyle"))'] }
