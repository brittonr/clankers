[package]
name = "clankers-ucan"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Clankers-specific capability vocabulary over public UCAN and Basalt"

[dependencies]
basalt = { workspace = true }
base64 = "0.22"
blake3 = { workspace = true }
clanker-auth = { workspace = true }
clankers-runtime = { version = "0.1.0", path = "../clankers-runtime", optional = true }
iroh = { version = "0.96", features = ["address-lookup-mdns"] }
serde = { workspace = true }
serde_json = { workspace = true }
redb = "2.6"
tracing = { workspace = true }
rand = { workspace = true }
ucan = { workspace = true }

[features]
default = []
external-ucan = []
runtime-admission = ["dep:clankers-runtime", "external-ucan"]

[dev-dependencies]
tokio = { workspace = true }
tempfile = "3"

[lints]
workspace = true
