[package]
name = "clankers-ucan"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Clankers-specific capability types over clanker-auth generic tokens"

[dependencies]
clanker-auth = { git = "https://github.com/brittonr/clanker-auth" }
iroh = { version = "0.96", features = ["address-lookup-mdns"] }
serde = { workspace = true }
redb = "2.6"
tracing = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
tempfile = "3"

[lints]
workspace = true
