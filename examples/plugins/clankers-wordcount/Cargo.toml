[package]
name = "clankers-wordcount"
version = "0.1.0"
edition = "2021"
description = "Example clankers plugin: word count and text statistics"

[lib]
crate-type = ["cdylib"]

[dependencies]
extism-pdk = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Opt out of the parent workspace — this crate targets wasm32-unknown-unknown
[workspace]
