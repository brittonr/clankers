name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo check
      - run: cargo check --no-default-features
      - run: cargo check --manifest-path openspec-plugin/Cargo.toml --target wasm32-unknown-unknown

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add wasm32-unknown-unknown
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run
      - run: cargo test --doc
      - run: cargo test --manifest-path openspec-plugin/Cargo.toml --locked

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo build --manifest-path openspec-plugin/Cargo.toml --target wasm32-unknown-unknown --release --locked

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo clippy -- -D warnings
      - run: cargo clippy --manifest-path openspec-plugin/Cargo.toml --target wasm32-unknown-unknown -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
      - run: cargo fmt --manifest-path openspec-plugin/Cargo.toml --check
